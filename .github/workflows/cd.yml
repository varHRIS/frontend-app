name: Deploy_to_GitHub_Page

on:
    push:
      tags:
        - '[0-9]+.[0-9]+.[0-9]+'
jobs:
    build-pord-job:
      runs-on: ubuntu-latest
      steps: 
          - name: Clone Repo
            uses: actions/checkout@v5
          - name: Setup Node V24.14.0
            uses: actions/setup-node@v6
            with:
              node-version: '24.x'
              cache: 'npm'
          - name: Install dependencies
            run: npm ci #clean install
          - name: Build Project (production and create dist folder)
            run: npm run build
          - name: Upload dist folder artifact
            uses: actions/upload-artifact@v7
            with:
              name: dist-production
              path: dist