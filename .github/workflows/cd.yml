name: Deploy_to_GitHub_Page

on:
    push:
      tags:
        - '[0-9]+.[0-9]+.[0-9]+'
jobs:
    build-pord-job:
      runs-on: ubuntu-latest
      steps: 
          - name: Clone Repo
            uses: actions/checkout@v5
          - name: Setup Node V24.14.0
            uses: actions/setup-node@v6
            with:
              node-version: '24.x'
              cache: 'npm'
          - name: Install dependencies
            run: npm ci #clean install
          - name: Build
            run: npm run build