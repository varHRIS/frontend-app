name: Frontend_Workshop_Demo

on:
  push:
    branches:
        - 'feature/**'
        - 'bugfix/**'
        - 'chore/**'
        - 'hotfix/**'
        - 'fix/**'
        - main
        - master
        - production
  pull_request:
    branches:
        - main
        - master
        - production

env:
    SERVER_IP: 'xxx-x-x-x'
    COMPANY_NAME: 'IOIP'
    REPO_NAME: ${{github.repository}}
    EVENT_NAME: ${{github.event_name}}


jobs:
  lint-job:
    runs-on: ubuntu-latest
    steps: 
        - uses: actions/checkout@v5
        - uses: actions/setup-node@v6
          with:
            node-version: '24.x'
            cache: 'npm'
        - run: npm ci #clean install
        - run: npm run lint

  build-job:
    runs-on: ubuntu-latest
    needs: lint-job
    steps: 
        - name: Clone Repo
          uses: actions/checkout@v5
        - name: Setup Node V24.14.0
          uses: actions/setup-node@v6
          with:
            node-version: '24.x'
            cache: 'npm'
        - name: Install dependencies
          run: npm ci #clean install
        - name: Build
          run: npm run build
